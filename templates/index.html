<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Biblioteca - FastAPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">📚 Gestão de Acervo</span>
        <div>
            <button class="btn btn-outline-light btn-sm" onclick="exportarJSON()">📥 Baixar JSON</button>
            <label class="btn btn-outline-info btn-sm mb-0">
                📤 Recuperar JSON <input type="file" id="importFile" hidden onchange="importarJSON(event)">
            </label>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Cadastrar Obra</div>
                <div class="card-body">
                    <form id="formObra">
                        <div class="mb-3">
                            <label class="form-label">ISBN</label>
                            <input type="text" id="isbn" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" id="titulo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Autor</label>
                            <input type="text" id="autor" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Adicionar à Memória</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-secondary text-white d-flex justify-content-between">
                    Listagem Geral do Acervo
                    <span id="contador" class="badge bg-light text-dark">0 itens</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ISBN</th>
                                <th>Título</th>
                                <th>Autor</th>
                                <th>Status</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaObras">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let biblioteca = JSON.parse(localStorage.getItem('biblioteca_dados')) || [];

    const form = document.getElementById('formObra');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const novaObra = {
            isbn: document.getElementById('isbn').value,
            titulo: document.getElementById('titulo').value,
            autor: document.getElementById('autor').value,
            status: 'LIVRE'
        };
        biblioteca.push(novaObra);
        salvarEAtualizar();
        form.reset();
    });

    function salvarEAtualizar() {
        localStorage.setItem('biblioteca_dados', JSON.stringify(biblioteca));
        renderizar();
    }

    function renderizar() {
        const tbody = document.getElementById('tabelaObras');
        const contador = document.getElementById('contador');
        tbody.innerHTML = '';
        
        biblioteca.forEach((obra, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${obra.isbn}</td>
                    <td>${obra.titulo}</td>
                    <td>${obra.autor}</td>
                    <td><span class="badge ${obra.status === 'LIVRE' ? 'bg-success' : 'bg-warning'}">${obra.status}</span></td>
                    <td><button class="btn btn-danger btn-sm" onclick="remover(${index})">🗑️</button></td>
                </tr>
            `;
        });
        contador.innerText = `${biblioteca.length} itens`;
    }

    function remover(index) {
        biblioteca.splice(index, 1);
        salvarEAtualizar();
    }

    // Funcionalidade de persistência solicitada
    function exportarJSON() {
        const blob = new Blob([JSON.stringify(biblioteca, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'acervo_biblioteca.json';
        a.click();
    }

    function importarJSON(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                biblioteca = JSON.parse(e.target.result);
                salvarEAtualizar();
                alert("Dados recuperados!");
            } catch (err) {
                alert("Erro ao ler o arquivo JSON.");
            }
        };
        reader.readAsText(event.target.files[0]);
    }

    // Inicializar tela
    renderizar();
</script>

</body>
</html>
